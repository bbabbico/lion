<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVENT BLASTER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:ital,wght@0,400;0,700;1,400;1,700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 480px;
      background: #0a0a2e;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(255, 0, 128, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(0, 255, 255, 0.1) 0%, transparent 50%);
      color: #fff;
      font-family: 'Comic Neue', cursive;
      overflow: hidden;
      border: 4px solid #ff00ff;
    }

    /* CRT scanline overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Title */
    .title {
      font-family: 'Bangers', Impact, sans-serif;
      font-size: 36px;
      text-align: center;
      text-transform: uppercase;
      color: #ff0;
      text-shadow:
        3px 3px 0 #ff0000,
        6px 6px 0 #000,
        0 0 20px rgba(255, 255, 0, 0.5),
        0 0 40px rgba(255, 0, 0, 0.3);
      letter-spacing: 3px;
      animation: titleGlitch 3s infinite;
      line-height: 1.1;
    }

    @keyframes titleGlitch {
      0%, 92%, 100% { transform: translate(0); }
      93% { transform: translate(-3px, 1px); color: #0ff; }
      94% { transform: translate(3px, -1px); color: #f0f; }
      95% { transform: translate(-1px, -2px); color: #ff0; }
      96% { transform: translate(2px, 2px); }
    }

    .subtitle {
      font-family: 'Comic Neue', cursive;
      font-style: italic;
      font-size: 13px;
      text-align: center;
      color: #0ff;
      animation: blink 1.2s steps(1) infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* URL Display */
    .url-box {
      background: rgba(0, 0, 0, 0.6);
      border: 3px dashed #0f0;
      border-radius: 4px;
      padding: 10px;
      word-break: break-all;
    }

    .url-label {
      font-size: 11px;
      color: #0f0;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .url-text {
      font-size: 12px;
      color: #0f0;
      font-family: 'Courier New', monospace;
      line-height: 1.3;
    }

    /* Main Button */
    .blast-btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-family: 'Bangers', Impact, sans-serif;
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #000;
      background: linear-gradient(180deg, #ff0 0%, #ff8800 100%);
      border: 4px solid #ff0000;
      outline: 4px solid #000;
      border-radius: 4px;
      cursor: crosshair;
      transition: all 0.15s;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
      animation: btnPulse 2s ease-in-out infinite;
    }

    .blast-btn:hover {
      background: linear-gradient(180deg, #ff0000 0%, #ff00ff 100%);
      color: #fff;
      border-color: #0ff;
      outline-color: #ff0;
      transform: scale(1.03);
    }

    .blast-btn:active {
      transform: scale(0.97);
    }

    .blast-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      animation: none;
    }

    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
      50% { box-shadow: 0 0 30px rgba(255, 255, 0, 0.8), 0 0 60px rgba(255, 0, 0, 0.4); }
    }

    /* Status */
    .status-box {
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #f0f;
      border-radius: 4px;
      padding: 10px;
      min-height: 60px;
    }

    .status-label {
      font-size: 11px;
      color: #f0f;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .status-text {
      font-size: 13px;
      color: #fff;
      line-height: 1.4;
    }

    .status-text.success {
      color: #0f0;
      font-weight: bold;
      animation: blink 0.5s steps(1) 3;
    }

    .status-text.error {
      color: #f00;
    }

    /* Last executed */
    .last-exec-box {
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #0ff;
      border-radius: 4px;
      padding: 10px;
    }

    .last-exec-label {
      font-size: 11px;
      color: #0ff;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .last-exec-text {
      font-size: 14px;
      color: #ff0;
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }

    /* Log Section */
    .log-box {
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #888;
      border-radius: 4px;
      padding: 8px;
      max-height: 120px;
      overflow-y: auto;
    }

    .log-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .log-entries {
      font-size: 10px;
      font-family: 'Courier New', monospace;
      color: #aaa;
      line-height: 1.5;
    }

    .log-entry {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 2px 0;
    }

    .log-entry .log-time {
      color: #666;
    }

    .log-entry .log-fn {
      color: #0f0;
    }

    .log-entry .log-type {
      color: #f0f;
    }

    .log-entry .log-source {
      color: #0ff;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 10px;
      color: #555;
      margin-top: 4px;
    }

    /* Scrollbar */
    .log-box::-webkit-scrollbar {
      width: 6px;
    }
    .log-box::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.3);
    }
    .log-box::-webkit-scrollbar-thumb {
      background: #f0f;
      border-radius: 3px;
    }

    /* Controls */
    .control-box {
      background: rgba(0, 0, 0, 0.6);
      border: 3px solid #f0f;
      border-radius: 4px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-label {
      font-size: 14px;
      color: #fff;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .control-input {
      width: 70px;
      padding: 6px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      background: #000;
      color: #0f0;
      border: 2px solid #0f0;
      border-radius: 4px;
      outline: none;
    }

    /* Cancel button */
    .cancel-btn {
      display: none;
      width: 100%;
      padding: 10px;
      font-family: 'Comic Neue', cursive;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background: #f00;
      border: 3px solid #ff0;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .cancel-btn:hover {
      background: #cc0000;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">💥 EVENT<br>BLASTER 💥</div>
    <div class="subtitle">~ click a button, break a site ~</div>

    <div class="url-box">
      <div class="url-label">▶ TARGET URL</div>
      <div class="url-text" id="currentUrl">Loading...</div>
    </div>

    <div class="control-box">
      <label class="control-label" for="functionCount">▶ FUNCTIONS TO TARGET:</label>
      <input type="number" id="functionCount" class="control-input" min="1" max="999" value="30">
    </div>

    <button class="blast-btn" id="blastBtn">🔥 BLAST IT 🔥</button>
    <button class="cancel-btn" id="cancelBtn">✖ CANCEL</button>

    <div class="status-box">
      <div class="status-label">▶ STATUS</div>
      <div class="status-text" id="statusText">Ready to blast!!!</div>
    </div>

    <div class="last-exec-box">
      <div class="last-exec-label">▶ LAST EXECUTED</div>
      <div class="last-exec-text" id="lastExec">— none —</div>
    </div>

    <div class="log-box">
      <div class="log-label">▶ SERVER LOG</div>
      <div class="log-entries" id="logEntries">
        <div class="log-entry" style="color:#555;">No logs yet...</div>
      </div>
    </div>

    <div class="footer">EVENT BLASTER v1.0 — USE AT YOUR OWN RISK</div>
  </div>

  <script src="src/popup.js"></script>
</body>
</html>
