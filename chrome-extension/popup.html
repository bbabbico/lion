<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @font-face {
      font-family: 'Impact';
      src: local('Impact');
    }
    body {
      width: 350px;
      padding: 15px;
      margin: 0;
      background-color: #0000ff; /* Bold blue */
      color: #ffff00; /* Bold yellow */
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      text-align: center;
      border: 10px solid #ff0000;
      box-sizing: border-box;
    }
    h1 {
      font-family: 'Impact', sans-serif;
      font-size: 36px;
      color: #ff00ff; /* Magenta */
      text-transform: uppercase;
      text-shadow: 4px 4px 0 #000, 8px 8px 0 #00ff00;
      margin: 10px 0;
      animation: shake 0.5s infinite;
    }
    .subtext {
      font-style: italic;
      color: #00ff00;
      font-weight: bold;
      animation: blink 0.2s infinite;
      margin-bottom: 20px;
      font-size: 16px;
    }
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    #blastBtn {
      background-color: #ff0000;
      color: #fff;
      font-family: 'Impact', sans-serif;
      font-size: 28px;
      padding: 15px 30px;
      border: 6px double #00ff00;
      cursor: crosshair;
      text-transform: uppercase;
      box-shadow: 0 0 15px #ff00ff, inset 0 0 10px #ffff00;
      transition: all 0.1s;
    }
    #blastBtn:hover {
      background-color: #fff;
      color: #ff0000;
      border-color: #ff00ff;
    }
    #blastBtn:active {
      transform: scale(0.9);
    }
    .info {
      margin-top: 20px;
      font-size: 14px;
      background: #000;
      border: 3px dashed #00ff00;
      padding: 10px;
      text-align: left;
      word-break: break-all;
    }
    #status {
      color: #ff00ff;
      font-weight: bold;
      font-size: 18px;
      margin-top: 10px;
      text-shadow: 2px 2px 0 #000;
    }
  </style>
</head>
<body>
  <h1>EVENT BLASTER!!!</h1>
  <div class="subtext">>>> EXTREME FUNCTION EXECUTION <<<</div>
  
  <button id="blastBtn">BLAST START!!!</button>
  
  <div class="info">
    <div><strong>TARGET URL:</strong> <span id="urlDisplay">Waiting...</span></div>
  </div>
  
  <div id="status">READY TO DESTROY!!!</div>
  
  <script src="popup.js"></script>
</body>
</html>
